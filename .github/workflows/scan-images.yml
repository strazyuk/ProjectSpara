name: Scan Images

on:
  push:
    branches: ["main", "master"]

permissions:
  security-events: write
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build -t project-spara-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t project-spara-frontend:latest ./frontend

      - name: Authenticate to Docker (Optional)
        # Required for some Docker Scout features
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: env.DOCKERHUB_USERNAME != ''

      - name: Docker Scout Scan (Backend)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: project-spara-backend:latest
          sarif-file: backend-scout.sarif
          summary: true

      - name: Docker Scout Scan (Frontend)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: project-spara-frontend:latest
          sarif-file: frontend-scout.sarif
          summary: true

      - name: Upload SARIF (Backend)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-scout.sarif
          category: backend

      - name: Upload SARIF (Frontend)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend-scout.sarif
          category: frontend
